name: kaly_app
description: Application de gestion de repas et événements.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Navigation
  go_router: ^13.0.0
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Network
  dio: ^5.4.0
  
  # Secure Storage (Pour le JWT Token)
  flutter_secure_storage: ^9.0.0
  
  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2
  
  # UI & Utils
  cupertino_icons: ^1.0.6
  intl: ^0.20.2
  
  # Localization (Facilite la gestion des JSON)
  easy_localization: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  injectable_generator: ^2.4.1

flutter:
  uses-material-design: true
  
  # Assets pour les traductions
  assets:
    - assets/translations/